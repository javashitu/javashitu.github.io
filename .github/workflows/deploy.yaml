name: Deploy to GitHub Pages

on:
  push:
    branches: [main]  # 根据你的分支名修改（main/master）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4  # 更新到 v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # 更新到 v3
        with:
          path: "public/"  # 指定 public 目录为发布源

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v3  # 更新到 v3